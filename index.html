<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vextiers Rankings</title>
    <style>
        /* --- BASE STYLING --- */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f121a; 
            color: #fff; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; flex: 1; }

        h1 { 
            text-align: center; 
            color: #7a1d23; 
            font-size: 2.5rem; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(122, 29, 35, 0.4);
        }

        /* --- TABS & SEARCH --- */
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 25px; justify-content: center; }
        .tab { padding: 8px 16px; border-radius: 8px; background: #1c212b; cursor: pointer; border: 1px solid #333; color: #b0b0b0; transition: 0.2s; font-size: 0.9rem; }
        .tab.active { background: #7a1d23; border-color: #a02830; color: #fff; font-weight: bold; }
        input { width: 100%; padding: 15px; margin-bottom: 30px; border-radius: 12px; border: 1px solid #333; background: #1c212b; color: #fff; box-sizing: border-box; font-size: 1rem; outline: none; }

        /* --- CARDS & GRIDS --- */
        .player-card { background: #1c212b; display: flex; align-items: center; border-radius: 12px; margin-bottom: 12px; border: 1px solid #2a313d; cursor: pointer; transition: transform 0.1s; overflow: hidden; }
        .player-card:hover { transform: scale(1.01); border-color: #7a1d23; }
        .rank-badge { font-size: 2rem; font-weight: 900; font-style: italic; width: 70px; height: 75px; display: flex; align-items: center; justify-content: center; background: #21262d; color: #fff; flex-shrink: 0; }
        .rank-1 .rank-badge { background: #f2ce5a; color: #000; }
        .rank-2 .rank-badge { background: #8b949e; color: #000; }
        .rank-3 .rank-badge { background: #cd7f32; color: #fff; }
        .skin-display { width: 70px; height: 75px; background: #0d1017; display: flex; justify-content: center; align-items: flex-start; overflow: hidden; border-right: 1px solid #333; }
        .skin-display img { width: 100%; height: auto; image-rendering: pixelated; }
        .player-main { flex-grow: 1; padding-left: 20px; }
        .player-name { font-size: 1.3rem; font-weight: bold; }
        .player-title-line { color: #b0b0b0; font-size: 0.85rem; margin-top: 2px; }
        .region-tag { background: #7a1d23; color: white; padding: 4px 10px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; margin-right: 15px; }
        .card-tiers { display: flex; gap: 5px; padding-right: 20px; }
        .tag-mini { background: #2a313d; border: 1px solid #444; padding: 3px 7px; border-radius: 5px; font-size: 10px; color: #ccc; }
        .tier-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 20px; }
        .tier-column { background: #1c212b; border-radius: 12px; padding: 15px; border: 1px solid #333; }
        .tier-header { text-align: center; font-weight: 900; padding: 10px; border-radius: 8px; margin-bottom: 12px; text-transform: uppercase; font-size: 0.9rem; }
        .tier-1 { background: #f2ce5a; color: #000; }
        .tier-2 { background: #8b949e; color: #000; }
        .tier-3 { background: #cd7f32; color: #fff; }
        .tier-4, .tier-5 { background: #2a313d; color: #fff; }
        .tier-player { padding: 10px; margin-bottom: 8px; background: #0f121a; border-radius: 8px; text-align: center; font-size: 0.9rem; cursor: pointer; }

        /* --- STYLED FOOTER --- */
        footer {
            text-align: center;
            padding: 40px 20px;
            background: #0d1017;
            border-top: 2px solid #1c212b;
            color: #555;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .footer-credit {
            display: inline-block;
            padding: 5px 15px;
            border: 1px solid #333;
            border-radius: 20px;
            background: rgba(28, 33, 43, 0.5);
        }

        .footer-credit b {
            color: #7a1d23; /* Your brand red */
            text-shadow: 0 0 8px rgba(122, 29, 35, 0.3);
        }

        /* --- MODAL --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .hidden { display: none; }
        .modal-content { background: #1c212b; padding: 40px 30px; border-radius: 24px; width: 380px; text-align: center; border: 1px solid #333; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        #closeModal { position: absolute; top: 15px; right: 20px; cursor: pointer; color: #888; font-size: 1.5rem; }
        .modal-skin-container { background: radial-gradient(circle, #2a313d 0%, #0d1017 100%); border-radius: 15px; padding: 20px; display: inline-block; border: 1px solid #444; margin-bottom: 15px; }
        .avatar-modal { height: 180px; width: auto; image-rendering: pixelated; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6)); }
        .modal-name { font-size: 24px; font-weight: bold; margin: 10px 0 5px; }
        .modal-sub { color: #b0b0b0; font-size: 14px; margin-bottom: 10px; }
        .modal-points { color: #f2ce5a; font-size: 20px; font-weight: bold; margin-bottom: 20px; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 15px; }
        .tag-big { background: #2a313d; color: #d0d0d0; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; border: 1px solid #444; font-weight: bold; }
    </style>
</head>

<body>

<div class="container">
    <h1>Vextiers Rankings</h1>
    <div id="tabs" class="tabs"></div>
    <input id="search" placeholder="Search for a player name...">
    <div id="players">Loading rankings...</div>
</div>

<div id="playerModal" class="modal hidden">
    <div class="modal-content">
        <span id="closeModal">×</span>
        <div id="modalBody"></div>
    </div>
</div>

<footer>
    <div class="footer-credit">
        &copy; 2026 Developed by <b>Deletedfolder</b>
    </div>
</footer>

<script>
    const JSON_URL = 'https://raw.githubusercontent.com/Deletedfolder/Vextiers/main/index.json';
    const tabs = ["Overall", "Vanilla", "UHC", "Pot", "SMP", "Sword", "Axe", "Mace", "Diamond SMP", "NethPot", "Cart PvP", "Creeper", "Bridge", "Bow"];
    let currentTab = "Overall";
    let playersData = {};

    const playersDiv = document.getElementById("players");
    const searchInput = document.getElementById("search");
    const modal = document.getElementById("playerModal");
    document.getElementById("closeModal").onclick = () => modal.classList.add("hidden");

    function getPlayerTitle(points) {
        if (points >= 400) return "Combat Grandmaster";
        if (points >= 250) return "Combat Master";
        if (points >= 100) return "Combat Ace";
        if (points >= 50)  return "Combat Specialist";
        if (points >= 20)  return "Combat Cadet";
        if (points >= 10)  return "Combat Novice";
        return "Rookie";
    }

    async function fetchRankings() {
        try {
            const response = await fetch(JSON_URL);
            if (!response.ok) throw new Error('Fetch failed');
            playersData = await response.json();
            renderTabs();
            render();
        } catch (e) {
            playersDiv.innerHTML = "<div style='text-align:center;'>System Offline - Check Index Connection</div>";
            console.error(e);
        }
    }

    function openPlayerModal(p, rank) {
        const tiers = Array.isArray(p.tiers) ? p.tiers : [];
        const tagsHtml = tiers.map(t => `<span class="tag-big">${t}</span>`).join("");
        const title = getPlayerTitle(p.points);
        
        document.getElementById("modalBody").innerHTML = `
            <div class="modal-skin-container">
                <img class="avatar-modal" 
                     src="https://minotar.net/armor/body/${p.name}/150.png" 
                     onerror="this.src='https://minotar.net/armor/body/Steve/150.png'">
            </div>
            <div class="modal-name">${p.name}</div>
            <div class="modal-sub">${p.region || 'N/A'} • ${title} • Rank #${rank}</div>
            <div class="modal-points">${p.points} Combat Points</div>
            <div class="tag-container">${tagsHtml}</div>
        `;
        modal.classList.remove("hidden");
    }

    function renderTabs() {
        const tabsDiv = document.getElementById("tabs");
        tabsDiv.innerHTML = "";
        tabs.forEach(t => {
            const btn = document.createElement("div");
            btn.className = "tab" + (t === currentTab ? " active" : "");
            btn.textContent = t;
            btn.onclick = () => { currentTab = t; renderTabs(); render(); };
            tabsDiv.appendChild(btn);
        });
    }

    function mergeOverall() {
        const merged = {};
        Object.keys(playersData).forEach(mode => {
            if (Array.isArray(playersData[mode])) {
                playersData[mode].forEach(p => {
                    const id = p.name.toLowerCase().trim();
                    if (!merged[id]) {
                        merged[id] = { ...p, tiers: new Set(p.tiers || []) };
                    } else {
                        merged[id].points += p.points;
                        if (p.tiers) p.tiers.forEach(t => merged[id].tiers.add(t));
                    }
                });
            }
        });
        return Object.values(merged).map(p => ({ ...p, tiers: Array.from(p.tiers) }));
    }

    function render() {
        let displayPlayers = currentTab === "Overall" ? mergeOverall() : [...(playersData[currentTab] || [])];
        const search = searchInput.value.toLowerCase();
        if (search) displayPlayers = displayPlayers.filter(p => p.name.toLowerCase().includes(search));

        displayPlayers.sort((a, b) => b.points - a.points);
        playersDiv.innerHTML = "";

        if (displayPlayers.length === 0) {
            playersDiv.innerHTML = "<div style='text-align:center; color:#888; padding:50px;'>No Players Found</div>";
            return;
        }

        if (currentTab === "Overall") {
            displayPlayers.forEach((p, i) => {
                const rank = i + 1;
                const rankClass = rank <= 3 ? `rank-${rank}` : "";
                const title = getPlayerTitle(p.points);
                const div = document.createElement("div");
                div.className = `player-card ${rankClass}`;
                div.onclick = () => openPlayerModal(p, rank);
                
                div.innerHTML = `
                    <div class="rank-badge">${rank}.</div>
                    <div class="skin-display">
                        <img src="https://minotar.net/armor/body/${p.name}/100.png" onerror="this.src='https://minotar.net/armor/body/Steve/100.png'">
                    </div>
                    <div class="player-main">
                        <div class="player-name">${p.name}</div>
                        <div class="player-title-line">${title} (${p.points} points)</div>
                    </div>
                    <div class="region-tag">${p.region || 'N/A'}</div>
                    <div class="card-tiers">${(p.tiers || []).slice(0, 4).map(t => `<span class="tag-mini">${t}</span>`).join('')}</div>
                `;
                playersDiv.appendChild(div);
            });
        } else {
            const groups = { 1: [], 2: [], 3: [], 4: [], 5: [] };
            displayPlayers.forEach(p => {
                const tierStr = String(p.tiers[0] || "");
                const match = tierStr.match(/\d/); 
                if (match) groups[match[0]].push(p);
            });

            const grid = document.createElement("div");
            grid.className = "tier-grid";
            Object.keys(groups).forEach(tier => {
                if (groups[tier].length === 0) return;
                const col = document.createElement("div");
                col.className = "tier-column";
                col.innerHTML = `<div class="tier-header tier-${tier}">Tier ${tier}</div>`;
                groups[tier].forEach(p => {
                    const div = document.createElement("div");
                    div.className = "tier-player";
                    div.textContent = p.name;
                    div.onclick = () => openPlayerModal(p, displayPlayers.indexOf(p) + 1);
                    col.appendChild(div);
                });
                grid.appendChild(col);
            });
            playersDiv.appendChild(grid);
        }
    }

    fetchRankings();
    searchInput.oninput = render;
</script>
</body>
</html>
